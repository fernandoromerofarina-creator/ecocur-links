<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecocur</title>
<style>
  :root {
    --bg: #F0EFE9;
    --ink: #1F2A1E;
    --leaf: #3F6B3A;
    --leaf-light: #6F9C5E;
    --paper: #FFFFFF;
    --line: #D8D6CC;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 32px;
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .mark {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--leaf);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mark svg { width: 32px; height: 32px; }

  .brand h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .brand p {
    margin-top: 6px;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--leaf-light);
  }

  .links {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    color: var(--ink);
    transition: transform 0.15s ease, border-color 0.15s ease;
  }

  .link:hover {
    transform: translateY(-2px);
    border-color: var(--leaf);
  }

  .icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon svg { width: 20px; height: 20px; }

  .text strong {
    display: block;
    font-size: 16px;
    font-weight: 600;
  }

  .text span {
    display: block;
    font-size: 13px;
    color: #6B6F63;
    margin-top: 2px;
    word-break: break-word;
  }

  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #A9AC9F;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

  <div class="brand">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F0EFE9" stroke-width="1.6">
        <path d="M12 21c4-3 7-6.5 7-11A7 7 0 0 0 5 10c0 4.5 3 8 7 11z"/>
        <path d="M12 7v10M9 10c1 0 3 1 3 3M15 10c-1 0-3 1-3 3" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Ecocur</h1>
    <p>Contactanos</p>
  </div>

  <div class="links">

    <a class="link" href="https://wa.me/595971669192" target="_blank" rel="noopener">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="#3F6B3A">
          <path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.36 5.07L2 22l5.09-1.33A9.93 9.93 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm5.2 14.2c-.22.62-1.3 1.18-1.79 1.25-.46.07-1.03.1-1.66-.1-.38-.12-.87-.28-1.5-.55-2.64-1.14-4.36-3.8-4.5-3.98-.13-.18-1.07-1.42-1.07-2.7s.68-1.92.92-2.18c.24-.26.52-.32.7-.32h.5c.16 0 .37-.02.58.44.22.48.74 1.8.8 1.93.07.13.11.28.02.45-.4.84-.86 1.2-.95 1.36-.1.16-.18.34-.04.56.6 1.06 1.4 1.84 2.43 2.36.2.1.4.08.55-.08.18-.2.6-.7.78-.94.18-.24.36-.2.6-.12.24.08 1.56.74 1.83.87.27.13.45.2.52.31.07.12.07.66-.15 1.28z"/>
        </svg>
      </div>
      <div class="text">
        <strong>WhatsApp</strong>
        <span>+595 971 669192</span>
      </div>
    </a>

    <a class="link" href="mailto:Ventas@ecocur.com.py">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3F6B3A" stroke-width="1.8">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="M3 7l9 6 9-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="text">
        <strong>Correo</strong>
        <span>Ventas@ecocur.com.py</span>
      </div>

    <a class="link" href="https://maps.app.goo.gl/aDhFvci21D5C9F3u9?g_st=ic" target="_blank" rel="noopener">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3F6B3A" stroke-width="1.8">
          <path d="M12 21s-7-5.5-7-11a7 7 0 1 1 14 0c0 5.5-7 11-7 11z"/>
          <circle cx="12" cy="10" r="2.5"/>
        </svg>
      </div>
      <div class="text">
        <strong>Ubicación</strong>
        <span>Ver en Google Maps</span>
      </div>
    </a>

  </div>

  <footer>Ecocur · Paraguay</footer>

</body>
</html>
